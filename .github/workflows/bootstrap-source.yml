name: Bootstrap plugin source

on:
  push:
    branches: [main]
    paths:
      - ".bootstrap/**"
      - ".github/workflows/bootstrap-source.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct source archive
        shell: bash
        run: |
          cat .bootstrap/chunk-* > /tmp/source.b64
          base64 --decode /tmp/source.b64 > /tmp/source.tar.xz
          mkdir -p /tmp/plugin-source
          tar -xJf /tmp/source.tar.xz -C /tmp/plugin-source

      - name: Install prepared source tree
        shell: bash
        run: |
          rsync -a --delete \
            --exclude ".git/" \
            --exclude ".bootstrap/" \
            --exclude ".github/workflows/bootstrap-source.yml" \
            /tmp/plugin-source/ ./
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-source.yml

      - name: Commit source tree
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "Publish RPG Homebrew Importer 1.0.0 source"
          git push
