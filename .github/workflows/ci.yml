name: Verify plugin

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run checks and tests
        run: npm run verify

      - name: Build release bundle
        run: npm run build

      - name: Test compiled bundle
        run: npm run test:bundle

      - name: Validate release files
        shell: bash
        run: |
          test -s main.js
          test -s manifest.json
          test -s styles.css
          node -e "const p=require('./package.json'); const m=require('./manifest.json'); if(p.version!==m.version) throw new Error('package.json and manifest.json versions do not match')"
