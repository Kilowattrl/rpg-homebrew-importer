name: Verify plugin

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify source syntax
        run: node --check src/main.js

      - name: Run parser smoke tests
        run: node tests/parser-smoke.js

      - name: Validate plugin metadata
        shell: bash
        run: |
          test -s manifest.json
          test -s styles.css
          node -e "const p=require('./package.json'); const m=require('./manifest.json'); if(p.version!==m.version) throw new Error('package.json and manifest.json versions do not match'); if(!m.id||!m.name||!m.description) throw new Error('manifest.json is missing required fields')"
